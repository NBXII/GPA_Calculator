<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Zone - UniMetrics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/focus-zone.css" />
    <link rel="icon" href="assets/Logo.jpg" type="image/x-icon" />
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Home</a>
        <header>
            <h1>Focus Zone</h1>
            <p class="subtitle">A quiet space to boost your productivity.</p>
            <button id="themeToggleBtn" class="theme-btn">🌙</button>
        </header>

        <main id="focusZoneContainer">
            <div class="focus-zone-layout">
                <div class="timer-section">
                    <div class="timer-card">
                        <div class="timer-modes">
                            <button id="modePomodoro" class="timer-mode-btn active" data-mode="pomodoro">Pomodoro</button>
                            <button id="modeShortBreak" class="timer-mode-btn" data-mode="shortBreak">Short Break</button>
                            <button id="modeLongBreak" class="timer-mode-btn" data-mode="longBreak">Long Break</button>
                        </div>
                        <div class="timer-display">
                            <span id="timer-minutes">25</span>:<span id="timer-seconds">00</span>
                        </div>
                        <div class="timer-controls">
                            <button id="startStopBtn" class="primary-btn">Start</button>
                            <button id="resetBtn" class="icon-btn">Reset</button>
                        </div>
                    </div>
                    <div class="stats-card">
                        <h3>Today's Progress</h3>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-label">Focus Sessions</span>
                                <span id="pomodoroCount" class="stat-value">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Total Time</span>
                                <span id="totalTime" class="stat-value">0m</span>
                            </div>
                        </div>
                    </div>
                    <button id="settingsBtn" class="icon-btn settings-btn">Timer Settings</button>
                </div>
                <div class="task-section">
                    <div class="task-card">
                        <h3>Session Tasks</h3>
                        <ul id="taskList">
                            <!-- Tasks will be added here -->
                        </ul>
                        <form id="addTaskForm" class="add-task-form">
                            <input type="text" id="taskInput" placeholder="Add a task for this session..." required>
                            <button type="submit">+</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; <span id="year"></span> UniMetrics</p>
        </footer>
    </div>

    <div id="toastContainer"></div>
    <audio id="alarmSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <script src="js/main.js"></script>
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
